<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-맛집 앱 - 성수동</title>
    <!-- 폰트 및 아이콘 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Leaflet (지도 라이브러리) CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* 3D 파스텔 (블루 & 핑크) 테마 변수 설정 */
        :root {
            --pastel-blue: #9DB4E3;
            --pastel-pink: #F3C9D6;
            --bg-gradient: linear-gradient(135deg, #E2EBFA 0%, #FCE8ED 100%);
            --brand-gradient: linear-gradient(135deg, #A8C0FF 0%, #FFD6E8 100%);
            
            --text-dark: #2C3E50;
            --text-gray: #7F8C8D;
            --card-bg: rgba(255, 255, 255, 0.85);
            
            --shadow-light: #ffffff;
            --shadow-dark: rgba(163, 177, 198, 0.4);
            --naver-green: #03C75A; /* 네이버 시그니처 그린 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 헤더 및 검색창 디자인 --- */
        header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03), 
                        inset 0 -2px 5px rgba(255,255,255,0.7);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.8);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 변경점: 제목 텍스트를 선명한 단색으로 변경 */
        .header-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark); /* 선명한 다크 슬레이트 컬러 */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 아이콘만 파스텔 블루 컬러 유지 */
        .header-title i {
            color: #7A9CE0; 
        }

        /* 3D 검색창 */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 350px;
            background: #ffffff;
            border-radius: 25px;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.05), 
                        inset -3px -3px 6px rgba(255,255,255,0.9),
                        2px 2px 10px rgba(0,0,0,0.05);
            padding: 5px 10px;
            border: 1px solid rgba(255,255,255,0.9);
            transition: all 0.3s ease;
        }

        .search-container:focus-within {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.08), 
                        inset -2px -2px 5px rgba(255,255,255,0.9),
                        0 0 15px rgba(157, 180, 227, 0.4);
            border-color: var(--pastel-blue);
        }

        .search-input {
            border: none;
            background: transparent;
            outline: none;
            flex: 1;
            padding: 8px 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .search-btn {
            background: var(--brand-gradient);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        /* 대시보드 메인 레이아웃 */
        .dashboard-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 25px;
            height: calc(100vh - 75px);
        }

        /* --- 왼쪽 패널 (맛집 리스트) --- */
        .left-panel {
            width: 35%;
            min-width: 380px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                        -10px -10px 20px var(--shadow-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid rgba(255,255,255,0.7);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 18px;
            color: var(--text-dark);
            font-weight: 800;
        }

        .badge-results {
            background: var(--brand-gradient);
            color: white;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(243, 201, 214, 0.6);
        }

        .restaurant-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* 3D 파스텔 맛집 카드 디자인 */
        .restaurant-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255,255,255,1);
            box-shadow: 5px 5px 12px var(--shadow-dark), 
                        -5px -5px 12px var(--shadow-light);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .restaurant-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 8px 12px 20px rgba(168, 192, 255, 0.3), 
                        -8px -8px 20px var(--shadow-light);
            border: 1px solid var(--pastel-pink);
            background: linear-gradient(145deg, #ffffff, #FFF5F8);
        }

        .card-number {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 32px;
            height: 32px;
            background: var(--brand-gradient);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
            z-index: 2;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-left: 15px;
        }

        .res-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .res-rating {
            font-weight: 800;
            color: #FF7B9C; 
            background: #FFF0F4;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.05);
        }

        .res-info {
            padding-left: 15px;
            font-size: 13px;
            color: var(--text-gray);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .res-info p {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .res-info i {
            color: var(--pastel-blue);
            font-size: 14px;
            width: 14px;
            text-align: center;
        }

        /* --- 추가됨: 네이버 리뷰 링크 디자인 --- */
        .naver-link-card {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(3, 199, 90, 0.08);
            color: var(--naver-green);
            font-size: 12px;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            width: fit-content;
            border: 1px solid rgba(3, 199, 90, 0.2);
        }

        .naver-link-card:hover {
            background: var(--naver-green);
            color: white;
            box-shadow: 0 4px 10px rgba(3, 199, 90, 0.3);
        }

        .naver-icon {
            font-family: Arial, sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 13px;
        }

        /* --- 오른쪽 패널 (지도) --- */
        .right-panel {
            width: 65%;
            border-radius: 24px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 12px 12px 25px var(--shadow-dark), 
                        -10px -10px 25px var(--shadow-light);
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* --- 파스텔 그라데이션 커스텀 마커 --- */
        .custom-pin-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-body {
            width: 38px;
            height: 38px;
            background: var(--brand-gradient);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            border: 3px solid white;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .pin-body:hover {
            transform: rotate(-45deg) scale(1.15);
            background: linear-gradient(135deg, #FF9A9E, #FECFEF);
        }

        .pin-body span {
            transform: rotate(45deg);
            color: white;
            font-weight: 800;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .pin-pulse {
            position: absolute;
            bottom: -5px;
            width: 20px;
            height: 20px;
            background: rgba(243, 201, 214, 0.6);
            border-radius: 50%;
            z-index: -1;
            animation: pulsate 1.5s infinite ease-out;
        }

        @keyframes pulsate {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        /* 팝업 창 커스텀 및 리뷰 링크 추가 */
        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid white;
        }
        .leaflet-popup-content { margin: 16px; text-align: center; }
        .popup-title { font-weight: 800; font-size: 17px; color: var(--text-dark); margin-bottom: 4px; }
        .popup-cate { font-size: 13px; color: var(--pastel-blue); font-weight: 700; margin-bottom: 10px; }
        .popup-rating { font-weight: 700; color: #FF7B9C; margin-bottom: 10px; display: inline-block; background: #FFF0F4; padding: 2px 8px; border-radius: 10px;}
        
        .naver-link-popup {
            display: block;
            padding: 8px 12px;
            background: var(--naver-green);
            color: white;
            font-size: 13px;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .naver-link-popup:hover {
            background: #02b350;
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; margin: 10px; }
        ::-webkit-scrollbar-thumb { background: #D1D9E6; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: var(--pastel-blue); border: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <!-- 제목을 선명하고 어두운 톤으로 변경 -->
            <div class="header-title">
                <i class="fa-solid fa-map-location-dot"></i> 
                K-맛집 앱
            </div>
        </div>
        
        <!-- 중앙 3D 입체 검색창 -->
        <div class="search-container">
            <input type="text" class="search-input" value="성수동" placeholder="지역이나 식당을 검색하세요">
            <button class="search-btn" onclick="alert('현재는 성수동 시연 데이터를 제공하고 있습니다.')">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        
        <div style="width: 120px;"></div> <!-- 우측 여백 맞춤용 -->
    </header>

    <div class="dashboard-container">
        <!-- 왼쪽 패널 -->
        <div class="left-panel">
            <div class="panel-header">
                <h2>'성수동' 검색 결과</h2>
                <span class="badge-results">30 Places</span>
            </div>
            <div class="restaurant-list" id="restaurant-list">
                <!-- JS 데이터 렌더링 영역 -->
            </div>
        </div>

        <!-- 오른쪽 패널 (지도) -->
        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 성수동 30개 맛집 데이터
        const restaurants =[
            { id: 1, name: "소문난성수감자탕", rating: 4.8, category: "감자탕/해장국", address: "서울 성동구 연무장길 45", lat: 37.5442, lng: 127.0543 },
            { id: 2, name: "대림국수 성수", rating: 4.6, category: "국수/꼬치", address: "서울 성동구 연무장7가길 5-1", lat: 37.5445, lng: 127.0521 },
            { id: 3, name: "제스티살룬 성수", rating: 4.7, category: "수제버거", address: "서울 성동구 서울숲2길 19", lat: 37.5458, lng: 127.0423 },
            { id: 4, name: "쵸리상경", rating: 4.6, category: "한식/솥밥", address: "서울 성동구 서울숲4길 18-8", lat: 37.5461, lng: 127.0435 },
            { id: 5, name: "난포", rating: 4.7, category: "퓨전 한식", address: "서울 성동구 서울숲4길 18-8", lat: 37.5463, lng: 127.0432 },
            { id: 6, name: "성수다락", rating: 4.5, category: "양식/파스타", address: "서울 성동구 뚝섬로9길 20", lat: 37.5422, lng: 127.0558 },
            { id: 7, name: "르프리크", rating: 4.8, category: "수제버거(치킨버거)", address: "서울 성동구 연무장5길 9-16", lat: 37.5447, lng: 127.0566 },
            { id: 8, name: "탐광", rating: 4.5, category: "일식/가츠동", address: "서울 성동구 연무장5가길 26", lat: 37.5411, lng: 127.0523 },
            { id: 9, name: "꿉당 성수점", rating: 4.9, category: "돼지고기 구이", address: "서울 성동구 성수이로20길 10", lat: 37.5446, lng: 127.0564 },
            { id: 10, name: "팩피(FAGP)", rating: 4.7, category: "이탈리안/미슐랭", address: "서울 성동구 왕십리로 136", lat: 37.5435, lng: 127.0551 },
            { id: 11, name: "할아버지공장", rating: 4.4, category: "대형 카페/브런치", address: "서울 성동구 성수이로7가길 9", lat: 37.5412, lng: 127.0549 },
            { id: 12, name: "블루보틀 성수 카페", rating: 4.6, category: "카페", address: "서울 성동구 아차산로 7", lat: 37.5482, lng: 127.0474 },
            { id: 13, name: "어니언 성수", rating: 4.5, category: "베이커리 카페", address: "서울 성동구 아차산로9길 8", lat: 37.5448, lng: 127.0583 },
            { id: 14, name: "카멜커피", rating: 4.6, category: "카페/디저트", address: "서울 성동구 성덕정19길 6", lat: 37.5415, lng: 127.0510 },
            { id: 15, name: "소바식당", rating: 4.4, category: "일식/소바", address: "서울 성동구 연무장7가길 6", lat: 37.5438, lng: 127.0544 },
            { id: 16, name: "호호식당 성수", rating: 4.5, category: "일본 가정식", address: "서울 성동구 뚝섬로9길 20", lat: 37.5425, lng: 127.0528 },
            { id: 17, name: "대성갈비", rating: 4.7, category: "돼지갈비", address: "서울 성동구 서울숲4길 27", lat: 37.5468, lng: 127.0439 },
            { id: 18, name: "소녀방앗간", rating: 4.4, category: "건강 한식", address: "서울 성동구 왕십리로5길 9-16", lat: 37.5471, lng: 127.0445 },
            { id: 19, name: "뚝도농원", rating: 4.6, category: "오리고기 구이", address: "서울 성동구 아차산로 82", lat: 37.5426, lng: 127.0561 },
            { id: 20, name: "진작다이닝", rating: 4.5, category: "퓨전 일식", address: "서울 성동구 왕십리로14나길 10", lat: 37.5465, lng: 127.0441 },
            { id: 21, name: "메종파이프그라운드", rating: 4.6, category: "피자/양식", address: "서울 성동구 서울숲2길 27", lat: 37.5433, lng: 127.0448 },
            { id: 22, name: "에르제 성수", rating: 4.7, category: "베이커리", address: "서울 성동구 아차산로 135", lat: 37.5429, lng: 127.0541 },
            { id: 23, name: "오트 성수", rating: 4.5, category: "브런치 카페", address: "서울 성동구 연무장길 10", lat: 37.5440, lng: 127.0533 },
            { id: 24, name: "바오나이트마켓", rating: 4.4, category: "아시안 퓨전", address: "서울 성동구 서울숲2길 14", lat: 37.5453, lng: 127.0418 },
            { id: 25, name: "누디트 성수", rating: 4.6, category: "복합문화공간", address: "서울 성동구 연무장15길 11", lat: 37.5451, lng: 127.0539 },
            { id: 26, name: "로우키", rating: 4.7, category: "스페셜티 커피", address: "서울 성동구 연무장3길 6", lat: 37.5431, lng: 127.0567 },
            { id: 27, name: "전자방", rating: 4.5, category: "중식당", address: "서울 성동구 성수일로12길 23", lat: 37.5461, lng: 127.0428 },
            { id: 28, name: "성수동집", rating: 4.4, category: "육칼/한식", address: "서울 성동구 성수이로 118", lat: 37.5455, lng: 127.0512 },
            { id: 29, name: "자연도소금빵", rating: 4.8, category: "베이커리", address: "서울 성동구 연무장길 56", lat: 37.5444, lng: 127.0572 },
            { id: 30, name: "보이어", rating: 4.6, category: "내추럴와인/양식", address: "서울 성동구 연무장15길 11", lat: 37.5432, lng: 127.0514 }
        ];

        // 지도 초기화
        const map = L.map('map', { zoomControl: false }).setView([37.5445, 127.0500], 15);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 부드러운 지도 타일
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const markers = {};
        const bounds =[];
        const listContainer = document.getElementById('restaurant-list');

        restaurants.forEach((res, index) => {
            // 네이버 통합검색 링크 생성 (식당 이름 + 성수동)
            const searchQuery = encodeURIComponent("성수동 " + res.name);
            const naverSearchUrl = `https://search.naver.com/search.naver?query=${searchQuery}`;

            // 파스텔 그라데이션 커스텀 마커
            const customIcon = L.divIcon({
                className: 'custom-pin-container',
                html: `
                    <div class="pin-body"><span>${index + 1}</span></div>
                    <div class="pin-pulse"></div>
                `,
                iconSize:[40, 40],
                iconAnchor:[20, 40] 
            });

            const marker = L.marker([res.lat, res.lng], { icon: customIcon }).addTo(map);
            bounds.push([res.lat, res.lng]);

            // 팝업 설정 (네이버 리뷰 버튼 포함)
            const popupContent = `
                <div class="popup-title">${res.name}</div>
                <div class="popup-cate">${res.category}</div>
                <div class="popup-rating"><i class="fa-solid fa-star"></i> ${res.rating}</div>
                <a href="${naverSearchUrl}" target="_blank" class="naver-link-popup">
                    <span class="naver-icon">N</span> 네이버 리뷰 보기
                </a>
            `;
            marker.bindPopup(popupContent, { offset:[0, -35] });
            markers[res.id] = marker;

            // HTML 카드 렌더링 (네이버 리뷰 링크 포함)
            const card = document.createElement('div');
            card.className = 'restaurant-card';
            card.innerHTML = `
                <div class="card-number">${index + 1}</div>
                <div class="card-header">
                    <div class="res-name">${res.name}</div>
                    <div class="res-rating"><i class="fa-solid fa-star"></i> ${res.rating}</div>
                </div>
                <div class="res-info">
                    <p><i class="fa-solid fa-utensils"></i> ${res.category}</p>
                    <p><i class="fa-solid fa-location-dot"></i> ${res.address}</p>
                    
                    <!-- 네이버 링크 클릭 시 지도 이동 이벤트 방지 (stopPropagation) -->
                    <a href="${naverSearchUrl}" target="_blank" class="naver-link-card" onclick="event.stopPropagation();">
                        <span class="naver-icon">N</span> 리뷰 및 후기
                    </a>
                </div>
            `;

            // 카드 클릭 시 인터랙션 (지도 위치 이동)
            card.addEventListener('click', () => {
                map.flyTo([res.lat, res.lng], 18, { animate: true, duration: 1.2 });
                marker.setZIndexOffset(1000);
                setTimeout(() => { marker.openPopup(); }, 1200);
            });

            listContainer.appendChild(card);
        });

        // 지도 영역 자동 맞춤
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding:[60, 60] });
        }
    </script>
</body>
</html>
